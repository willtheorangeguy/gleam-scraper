version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gleam_user
      POSTGRES_PASSWORD: gleam_password
      POSTGRES_DB: gleam_scraper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gleam_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://gleam_user:gleam_password@db:5432/gleam_scraper
      CACHE_TTL: 30
      REQUEST_TIMEOUT: 10
      DEBUG: "False"
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
